name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-autogenerated:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - feature: cli-tools
            baseImage: mcr.microsoft.com/devcontainers/javascript-node:24
          - feature: codex
            baseImage: mcr.microsoft.com/devcontainers/javascript-node:24
          - feature: node
            baseImage: ubuntu:latest
          - feature: npm-packages
            baseImage: mcr.microsoft.com/devcontainers/javascript-node:24
          - feature: apt-packages
            baseImage: ubuntu:latest
          - feature: pi
            baseImage: mcr.microsoft.com/devcontainers/javascript-node:24
          - feature: playwright
            baseImage: mcr.microsoft.com/devcontainers/javascript-node:24
          - feature: apt-python
            baseImage: ubuntu:latest
          - feature: pipx-packages
            baseImage: mcr.microsoft.com/devcontainers/python:3.14
    steps:
      - uses: actions/checkout@v7

      - name: "Install latest devcontainer CLI"
        run: npm install --global --ignore-scripts --min-release-age=7 @devcontainers/cli

      - name: "Generating tests for '${{ matrix.feature }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.feature }} -i ${{ matrix.baseImage }} .

  test-scenarios:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - cli-tools
          - codex
          - node
          - npm-packages
          - apt-packages
          - pi
          - playwright
          - apt-python
          - pipx-packages
    steps:
      - uses: actions/checkout@v7

      - name: "Install latest devcontainer CLI"
        run: npm install --global --ignore-scripts --min-release-age=7 @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' scenarios"
        run: devcontainer features test -f ${{ matrix.features }} --skip-autogenerated --skip-duplicated .

  test-global:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: "Install latest devcontainer CLI"
        run: npm install --global --ignore-scripts --min-release-age=7 @devcontainers/cli

      - name: "Testing global scenarios"
        run: devcontainer features test --global-scenarios-only .
